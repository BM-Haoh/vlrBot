name: Docker Build and Push VLRBot

# O workflow dispara sempre que houver um push na branch main
on:
  push:
    branches: [ "setup-docker" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Login no Docker Hub usando as Secrets que você configurou
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Build da imagem e Push para o seu repositório público
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # Note que usamos o seu username das secrets para compor a tag
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/vlrbot-app:latest

      # Opcional: Notificação de sucesso (útil para o time de 3 pessoas)
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}